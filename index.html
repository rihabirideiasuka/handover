<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#ff1493" />
  <meta name="robots" content="noindex, nofollow" />

  <!-- iOS ホーム画面 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="申し送り" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <!-- アイコン類 -->
  <link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png" />

  <!-- Android/PC（ショートカット名やアイコンの補助） -->
  <link rel="manifest" href="./manifest.webmanifest" />

  <title>申し送り（起動）</title>

  <style>
    :root{--bg:#f9f5ee;--fg:#222;--muted:#666;--accent:#ff1493}
    body{margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif}
    .wrap{max-width:720px;margin:10vh auto;padding:24px}
    .card{background:#fff;border:1px solid rgba(0,0,0,.08);border-radius:16px;padding:22px;box-shadow:0 6px 22px rgba(0,0,0,.06)}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 14px;border-radius:12px;
         background:var(--accent);color:#fff;text-decoration:none;font-weight:800;border:0;cursor:pointer}
    .ghost{background:#fff;color:var(--fg);border:1px solid rgba(0,0,0,.12)}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    small{color:var(--muted)}
  </style>

  <noscript>
    <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbwrcoOYZQJa22ySCYHAeRqFea1PMU74O9Lv4ttXISZbacJS_-6GxpmSlPGIcHiAhD_m/exec">
  </noscript>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 style="margin:0 0 6px;font-size:1.25rem">起動中…</h1>
      <div id="msg"><small>自動で申し送りに移動します。開かない場合は下のボタンを押してください。</small></div>
      <div class="row">
        <a id="go" class="btn" href="#">今すぐ開く</a>
        <a class="btn ghost" href="./install.html">ホーム追加の手順</a>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwrcoOYZQJa22ySCYHAeRqFea1PMU74O9Lv4ttXISZbacJS_-6GxpmSlPGIcHiAhD_m/exec";

    // stay=1 のときは自動遷移しない（共有メニューを押しやすくする用）
    const u = new URL(location.href);
    const stay = u.searchParams.get('stay') === '1';

    // このページのクエリは（stay以外）GASへ引き継ぐ
    const out = new URL(GAS_URL);
    u.searchParams.forEach((v,k)=>{
      if(k === 'stay') return;
      out.searchParams.append(k,v);
    });
    const target = out.toString() + (location.hash || '');

    document.getElementById('go').href = target;

    if (!stay) {
      // 履歴を汚さず移動
      setTimeout(()=>location.replace(target), 250);
    } else {
      document.getElementById('msg').innerHTML =
        "<small>自動遷移を止めています（stay=1）。共有→ホーム画面に追加がしやすい状態です。</small>";
    }
  </script>
</body>
</html>
