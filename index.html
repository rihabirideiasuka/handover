<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>本日の申し送り</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1556d1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="本日の申し送り" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />

  <!-- PC用ファビコン -->
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />

  <!-- iPhoneホーム画面用 -->
  <link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png" />

  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --accent:#1556d1;
      --line:#e5e7eb;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;
      background:var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .card{
      width:min(92vw,420px);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:24px 20px;
      box-shadow:0 10px 30px rgba(0,0,0,.06);
      text-align:center;
    }
    .icon{
      width:72px;
      height:72px;
      border-radius:18px;
      display:block;
      margin:0 auto 16px;
    }
    h1{
      margin:0 0 8px;
      font-size:20px;
      line-height:1.4;
    }
    p{
      margin:0;
      color:var(--muted);
      line-height:1.7;
      font-size:14px;
    }
    .dots{
      margin-top:16px;
      display:flex;
      gap:8px;
      justify-content:center;
    }
    .dots span{
      width:8px;
      height:8px;
      border-radius:999px;
      background:var(--accent);
      opacity:.25;
      animation:blink 1.2s infinite ease-in-out;
    }
    .dots span:nth-child(2){animation-delay:.2s}
    .dots span:nth-child(3){animation-delay:.4s}

    @keyframes blink{
      0%,80%,100%{transform:scale(1);opacity:.25}
      40%{transform:scale(1.35);opacity:1}
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="icon" src="./icon-180.png" alt="アイコン" />
    <h1>本日の申し送り</h1>
    <p>アプリを開いています…</p>
    <div class="dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <script>
    // ===== ここを自分の Apps Script /exec URL に変更 =====
    const EXEC_URL = 'YOUR_APPS_SCRIPT_EXEC_URL';

    (function () {
      const search = window.location.search || '';
      const hash   = window.location.hash || '';
      const target = EXEC_URL + search + hash;

      // 少しだけ表示してから遷移
      setTimeout(() => {
        window.location.replace(target);
      }, 150);
    })();
  </script>
</body>
</html>
