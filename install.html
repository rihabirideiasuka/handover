<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#ff1493" />
  <meta name="robots" content="noindex, nofollow" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="申し送り" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png" />
  <link rel="manifest" href="./manifest.webmanifest" />

  <title>申し送り：ホーム追加手順</title>

  <style>
    :root{--bg:#f9f5ee;--card:#fff;--line:rgba(0,0,0,.10);--fg:#222;--muted:#666;--accent:#ff1493}
    body{margin:0;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,"Noto Sans JP",sans-serif}
    .wrap{max-width:760px;margin:7vh auto;padding:22px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;box-shadow:0 6px 22px rgba(0,0,0,.06)}
    h1{margin:0 0 10px;font-size:1.25rem}
    ol{line-height:1.9;padding-left:20px;margin:0}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 14px;border-radius:12px;
         background:var(--accent);color:#fff;text-decoration:none;font-weight:800;border:0}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    small{color:var(--muted)}
    code{background:rgba(0,0,0,.06);padding:.1em .35em;border-radius:6px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>ホーム画面に追加（iPhone / iPad）</h1>
      <ol>
        <li>このページをSafariで開く</li>
        <li>下の共有（四角＋↑）→ <strong>ホーム画面に追加</strong></li>
        <li>名前を確認して右上の <strong>追加</strong></li>
        <li>追加後は、ホームのアイコンから起動（タップ）</li>
      </ol>

      <div class="row">
        <a class="btn" href="./index.html?stay=1">起動ページを開く（共有しやすい）</a>
        <a class="btn" style="background:#fff;color:#222;border:1px solid rgba(0,0,0,.12)" href="./index.html">通常起動</a>
      </div>

      <p style="margin:14px 0 0">
        <small>
          アイコンが変わらない時：iOSのキャッシュが強いです。<br>
          一番確実なのは <strong>アイコンのファイル名を変える</strong>（例：<code>icon-180_v2.png</code>）→HTML側の参照も同じ名前に変更 → 再追加。
        </small>
      </p>
    </div>
  </div>
</body>
</html>
