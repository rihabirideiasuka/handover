<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>本日の申し送り</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1556d1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="本日の申し送り">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">

  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:#f5f7fb;
      color:#111827;
      padding:20px;
    }
    .card{
      width:min(92vw,420px);
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:18px;
      padding:24px 20px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,.06);
    }
    img{
      width:72px;
      height:72px;
      border-radius:18px;
      display:block;
      margin:0 auto 16px;
    }
    h1{margin:0 0 10px;font-size:20px}
    p{margin:0 0 14px;line-height:1.7;color:#6b7280}
    .btn{
      display:inline-block;
      padding:14px 18px;
      min-width:220px;
      border:none;
      border-radius:14px;
      background:#1556d1;
      color:#fff;
      font-size:16px;
      font-weight:700;
    }
    .help{font-size:13px;color:#6b7280}
  </style>
</head>
<body>
  <div class="card">
    <img src="./apple-touch-icon.png" alt="アイコン">
    <h1>本日の申し送り</h1>
    <p id="msg">この画面のまま Safari の共有から「ホーム画面に追加」してください。</p>
    <button class="btn" id="openBtn" type="button">本体を開く</button>
    <p class="help">※ 追加前に自動で別ページへ移動しない設計です</p>
  </div>

  <script>
    const EXEC_URL = 'https://script.google.com/macros/s/AKfycbzVc2KRvI1BdXs4YzUVZXe6IiPz8TbC8RNEguzsjB5iN9Ib_PdmS1UIBuOoIonsWC6Llw/exec';

    function openApp() {
      location.href = EXEC_URL + location.search + location.hash;
    }

    // iPhoneのホーム画面から起動された時だけ本体へ移動
    if (window.navigator.standalone === true) {
      document.getElementById('msg').textContent = 'アプリを開いています…';
      setTimeout(openApp, 150);
    }

    document.getElementById('openBtn').addEventListener('click', openApp);
  </script>
</body>

</html>
